# TEMPORARY debug workflow: x86_64-only macOS sign + smoke + dmg + HID validation on the Intel
# runner (push-triggered on this branch only). No Windows/Linux, no pre-release. DELETE before merge.
name: macOS x64 smoke (debug)
'on':
  push:
    branches:
    - worktree-macos-signing-fix
  workflow_dispatch: null
env:
  JAVA_VERSION: '25'
jobs:
  smoke:
    name: 'macOS x86_64 smoke (debug - DELETE after #101 validation)'
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v6
    - name: Set up GraalVM CE
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: graalvm-community
        native-image-job-reports: 'true'
        cache: maven
    - name: Compute app version
      id: ver
      run: 'base=$(grep -oE ''<project\.baseversion>[^<]+'' pom.xml | head -1 | sed ''s/<project\.baseversion>//'')

        echo "version=${base}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

        '
    - name: Generate native-image metadata
      id: gen
      continue-on-error: true
      run: mvn -Pnative-config-gen test -Dquarkus.native.enabled=false --file pom.xml
    - name: Warn if metadata generation failed
      if: steps.gen.outcome == 'failure'
      run: echo "::warning::Native-image metadata generation failed on macOS (macos-15-intel); the build used committed metadata (possibly stale)."
    - name: Build native image (macOS)
      id: build
      continue-on-error: true
      run: mvn -B package -Pnative -Dquarkus.application.version=${{ steps.ver.outputs.version }} --file pom.xml
    - name: Assemble .app bundle
      id: assemble
      continue-on-error: true
      run: "set -euxo pipefail\nexe=$(ls target/*-runner | head -1)\napp=\"target/PCPanel.app\"\nmkdir -p \"$app/Contents/MacOS\" \"$app/Contents/Resources\"\ncp \"$exe\" \"$app/Contents/MacOS/PCPanel\"\nchmod +x \"$app/Contents/MacOS/PCPanel\"\n# native-image drops the companion .dylib files next to the runner; keep them beside the binary.\ncp target/*.dylib \"$app/Contents/MacOS/\" 2>/dev/null || true\ncp app-icon.icns \"$app/Contents/Resources/PCPanel.icns\" 2>/dev/null || true\ncat > \"$app/Contents/Info.plist\" <<PLIST\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\">\n<dict>\n  <key>CFBundleName</key><string>PCPanel</string>\n  <key>CFBundleDisplayName</key><string>PCPanel</string>\n  <key>CFBundleIdentifier</key><string>com.getpcpanel.PCPanel</string>\n  <key>CFBundleVersion</key><string>${{ steps.ver.outputs.version }}</string>\n  <key>CFBundleShortVersionString</key><string>${{ steps.ver.outputs.version }}</string>\n  <key>CFBundleExecutable</key><string>PCPanel</string>\n  <key>CFBundleIconFile</key><string>PCPanel</string>\n  <key>CFBundlePackageType</key><string>APPL</string>\n  <key>LSMinimumSystemVersion</key><string>11.0</string>\n  <key>NSHighResolutionCapable</key><true/>\n</dict>\n</plist>\nPLIST\n"
    - name: Sign and smoke-test the .app bundle
      if: steps.assemble.outcome == 'success'
      run: "set -euxo pipefail\napp=\"target/PCPanel.app\"\nbin=\"$app/Contents/MacOS/PCPanel\"\n\n# --- Sign (ad-hoc; the issue-#101 fix) -------------------------------------------------\n# We have no Apple Developer ID, so this is an *ad-hoc* signature (`--sign -`): it does not\n# pass notarization, but it produces a structurally VALID signature, which is what macOS\n# actually requires to launch. On Apple Silicon the kernel refuses to run any Mach-O without\n# at least an ad-hoc signature (unsigned arm64 code is SIGKILLed at exec). GraalVM's linker\n# already ad-hoc-signs the runner binary, so it carries a bundle CodeDirectory that reserves\n# a slot for a sealed-resources manifest — but nothing ever signed the *bundle*, so\n# `Contents/_CodeSignature/CodeResources` was missing. That half-signed state is precisely\n# the \"code has no resources but signature indicates they must be present\" / \"PCPanel is\n# damaged\" failure (issue #101), and removing the quarantine xattr cannot fix it. Signing the\n# bundle generates the CodeResources manifest and makes the quarantine workaround work again.\n#\n# All bundle mutation (binary, dylibs, icon, Info.plist) happened in the assemble step —\n# touching any bundled file after signing would invalidate the seal. We sign inside-out\n# (every nested Mach-O first, the bundle last); `--deep` signing is deprecated by Apple and\n# is NOT used here. No entitlements are passed: the cs.* entitlements only take effect under\n# the Hardened Runtime, which an ad-hoc signature does not enable, so they would be inert.\nxattr -cr \"$app\"\nfind \"$app/Contents\" -type f \\( -name '*.dylib' -o -name '*.jnilib' -o -name '*.so' \\) \\\n  -exec codesign --force --sign - --timestamp=none {} +\ncodesign --force --sign - --timestamp=none \"$app\"\n\n# --- Smoke test: the app must actually START and DO WORK -------------------------------\n# This is the primary gate, and it is deliberately general: boot the bundled binary, wait for\n# the embedded HTTP server, then exercise real REST endpoints. Reaching those endpoints with\n# HTTP 200 proves the native image boots, Quarkus starts, the server binds, and backend state\n# round-trips through JSON (so it also guards the native-image serialization footguns called\n# out in CLAUDE.md — List<DTO> array reflection, FileSerializer). Code signing is verified as\n# a *side effect*: an invalidly signed bundle is SIGKILLed at exec, so the server never comes\n# up and this fails — which is why this test still catches a signing regression even if the\n# `codesign --verify` bonus check below is removed.\n\"$bin\" skipfilecheck quiet >pcpanel-smoke.log 2>&1 &\npid=$!\ntrap 'kill -KILL \"$pid\" 2>/dev/null || true; wait \"$pid\" 2>/dev/null || true' EXIT\n\nbase=\"http://127.0.0.1:7654\"\nup=0\nfor _ in $(seq 1 60); do\n  if ! kill -0 \"$pid\" 2>/dev/null; then\n    echo \"FAIL: the app process exited during startup (code-signature rejection or a crash)\"\n    cat pcpanel-smoke.log || true\n    exit 1\n  fi\n  if curl -fsS -o /dev/null \"$base/api/devices\"; then up=1; break; fi\n  sleep 2\ndone\nif [ \"$up\" != 1 ]; then\n  echo \"FAIL: app did not serve $base/api/devices within the timeout\"\n  cat pcpanel-smoke.log || true\n  exit 1\nfi\n\n# Do real work against the running app — each must return HTTP 200 with a JSON body.\nfor ep in /api/devices /api/audio/devices /api/audio/applications; do\n  code=$(curl -s -o /tmp/resp.json -w '%{http_code}' \"$base$ep\")\n  echo \"GET $ep -> $code\"\n  if [ \"$code\" != 200 ]; then\n    echo \"FAIL: $ep returned $code (a 5xx here usually means a native-image reflection gap)\"\n    head -c 2000 /tmp/resp.json || true; echo; cat pcpanel-smoke.log || true\n    exit 1\n  fi\ndone\necho \"Smoke test OK: the signed app booted and served its REST API.\"\n\n# HID device scanning must initialize: hid4java loads the platform hidapi native via JNA, and\n# on Apple Silicon that regressed when only an x86_64 hidapi was bundled (arm64 dlopen failed).\n# Fail if the startup log still reports the HID init failure, so a hidapi arch/registration\n\
        # regression is caught (no physical device is needed — hid_init initializes the subsystem).\nif grep -q \"Failed to initialize HID services\" pcpanel-smoke.log; then\n  echo \"FAIL: HID services did not initialize — hidapi native arch/load problem\"\n  grep -A3 \"Failed to initialize HID services\" pcpanel-smoke.log || true\n  exit 1\nfi\necho \"HID services initialized OK.\"\n\n# --- Bonus: explicit signature confirmation (a benefit, not the primary gate) ----------\ncodesign --verify --deep --strict --verbose=4 \"$app\"\ncodesign --display --verbose=4 \"$app\" || true\n"
    - name: Create .dmg
      if: steps.assemble.outcome == 'success'
      run: 'set -euxo pipefail

        arch=$(uname -m)   # arm64 or x86_64

        app="target/PCPanel.app"

        dmg="target/PCPanel-${{ steps.ver.outputs.version }}-${arch}.dmg"

        # NB: the host volume has plenty of free space — the earlier "hdiutil: create failed - No

        # space left on device" was hdiutil AUTO-SIZING the temporary image from the source folder

        # and coming up just short for the large (signed) runner binary, so the copy overflowed the

        # image itself. Size it explicitly instead: build a writable image at bundle-size + headroom,

        # then convert to the compressed read-only UDZO we ship.

        appkb=$(du -sk "$app" | awk ''{print $1}'')

        sizemb=$(( appkb / 1024 + 300 ))

        hdiutil create -volname PCPanel -srcfolder "$app" -ov -format UDRW -size "${sizemb}m" target/PCPanel-rw.dmg

        hdiutil convert target/PCPanel-rw.dmg -format UDZO -ov -o "$dmg"

        rm -f target/PCPanel-rw.dmg

        ls -lh "$dmg"

        '
    - name: Store .dmg artifact
      uses: actions/upload-artifact@v7
      with:
        name: macos-dmg-${{ runner.arch }}
        path: ./target/PCPanel-*.dmg
        if-no-files-found: ignore

<div>
  <mat-radio-group [(ngModel)]="mode" (change)="changeMode($event)">
    <mat-radio-button value="KEY">Key combination</mat-radio-button>
    <mat-radio-button value="TEXT">Text</mat-radio-button>
  </mat-radio-group>
</div>

@if (mode() === 'KEY') {
  <div class="keystroke-recorder">
    <mat-form-field>
      <mat-label>Key combination</mat-label>
      <input matInput
             readonly
             [value]="prettyKeystroke()"
             placeholder="Click here, then press a key combination"
             (keydown)="onKeyDown($event)"
             (focus)="recording.set(true)"
             (blur)="recording.set(false)" />
      <mat-hint>{{ recording() ? 'Press the keys now…' : 'Modifiers (Ctrl, Shift, Alt, Meta) are captured automatically.' }}</mat-hint>
    </mat-form-field>
    @if (prettyKeystroke()) {
      <button mat-button type="button" (click)="clearKeystroke()">Clear</button>
    }
  </div>
} @else {
  <div>
    <mat-form-field>
      <mat-label>Text to type</mat-label>
      <textarea matInput rows="3" [formField]="field().text"></textarea>
    </mat-form-field>
  </div>
}

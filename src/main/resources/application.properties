# Version info (filtered at build time)
pcpanel.version=@project.version@
pcpanel.build=@github.build@
pcpanel.github.user-and-repo=@github.repo@
pcpanel.build.os=@os.detected.name@
pcpanel.root=${user.home}/.pcpanel/
%dev.pcpanel.root=${user.home}/.pcpaneldev/

# Quarkus HTTP server (localhost only for desktop app)
quarkus.http.port=7654
quarkus.http.host=127.0.0.1
# LocalHttpGuard rejects any request whose Host/Origin header is not loopback, so a website the user
# visits cannot drive the API via DNS rebinding or cross-site WebSocket hijacking. Set to false only
# to deliberately expose the server (e.g. behind your own reverse proxy).
pcpanel.http.local-only=true

# ── Footprint tuning (desktop app: localhost, a single browser client) ──
# Vert.x defaults its event-loop pool to ~2x CPU cores (≈48 threads on a 24-core box) and a
# 20-thread worker pool. A local control app needs only a handful, so cap them to keep the
# thread count (and the per-thread stack memory) low.
# The Vert.x worker pool is sized by quarkus.thread-pool.max-threads (the old, now-deprecated
# quarkus.vertx.worker-pool-size defaulted to exactly that value).
quarkus.vertx.event-loops-pool-size=2
quarkus.vertx.internal-blocking-pool-size=2
quarkus.thread-pool.max-threads=8

# StreamEx ships without a Jandex index, so Quarkus can't resolve its type hierarchy when it walks
# the reflectively-registered command model (CommandVolume exposes an ISndCtrl whose PulseAudio
# implementation returns StreamEx). Index the jar so that registration succeeds without a warning.
quarkus.index-dependency.streamex.group-id=one.util
quarkus.index-dependency.streamex.artifact-id=streamex

# Quinoa (Angular frontend)
quarkus.quinoa.package-manager-install=false
# Angular application builder writes files into a browser/ subfolder.
quarkus.quinoa.build-dir=dist/pcpanel/browser
quarkus.quinoa.ignored-path-prefixes=/api,/q/,/ws
quarkus.quinoa.enable-spa-routing=true
%dev.pcpanel.skip-file-check=true
%dev.quarkus.quinoa.dev-server.port=4200
#%dev.linux.commands.kdotool=~/.cargo/bin/kdotool

# ── Dev hot reload ────────────────────────────────────────────────────────────
# Hot-swap method-body-only edits in place (JVM HotSwap) instead of dropping the app classloader
# and restarting. This is what makes iterating on logic survive without re-initialising the native
# subsystems: a fresh classloader cannot re-System.load() SndCtrl.dll (UnsatisfiedLinkError "already
# loaded in another classloader") and orphans JNI/Wave Link callback threads that then fire into the
# new container (ClassCastException). Structural edits (adding/removing a method, field, or bean) still
# force a full restart. Trade-off: on the hot-swap fast path @PostConstruct/ShutdownEvent do NOT re-run.
%dev.quarkus.live-reload.instrumentation=true

# Jackson
quarkus.jackson.fail-on-unknown-properties=false

# ── MCP server (dev-only) ─────────────────────────────────────────────────────
# A Model Context Protocol server (com.getpcpanel.mcp) that exposes the running app's runtime state
# and a hardware-free test harness (synthetic input, virtual devices, audio-state read) to an agent.
# It is compiled and wired ONLY when the `mcp` Maven profile is active (build with -Dpcpanel.mcp=true,
# e.g. `mvnw quarkus:dev -Dpcpanel.mcp=true`), so the default build - including the shipped native
# image - never contains it. The extension binds to the existing localhost HTTP server
# (127.0.0.1:7654) under /mcp. The individual dev tools are gated a second time, at build time, by the
# flag below (off by default; on in %dev). Future non-dev MCP tools will simply not carry this gate.
pcpanel.mcp.dev=false
%dev.pcpanel.mcp.dev=true

# Logging
quarkus.log.level=INFO
quarkus.log.file.enabled=true
quarkus.log.file.path=${pcpanel.root}/logs/logging.log
quarkus.log.file.rotation.max-file-size=5M
quarkus.log.file.rotation.max-backup-index=6
quarkus.log.category."org.jnativehook".level=OFF
quarkus.banner.enabled=false

# Linux commands
linux.commands.xdotool=xdotool
linux.commands.kdotool=kdotool

# OBS integration — enabled/disabled per user settings (save.obsEnabled); re-connects automatically every 30s

# ── GraalVM native image ──────────────────────────────────────────────────────
# NOTE: The authoritative native-image settings (resources.includes and
# additional-build-args) are in the <native> Maven profile in pom.xml, because
# Maven's process-resources phase does not run before quarkus:build when the
# goal is invoked directly (so this file is not on the classpath during
# augmentation).  The values below serve as documentation only.
#
# The Windows GUI-subsystem linker flags (/SUBSYSTEM:WINDOWS, /ENTRY:mainCRTStartup) are MSVC-only
# and would break the Linux/macOS native builds, so they are NOT listed here. They are injected per
# OS via the <native.platform.linker.args> property in pom.xml's os-windows profile.
#
# Include the Windows native DLL and hid4java native libraries in the image.
# SndCtrl.dll lives at the root of the classpath.
# hid4java embeds its native libs as  win32-x86-64/hidapi.dll  etc.
# JNA embeds jnidispatch as  com/sun/jna/win32-x86-64/jnidispatch.dll  etc.
# jnativehook embeds as  com/github/kwhat/jnativehook/lib/windows/…/JNativeHook.dll  etc.
# Use **/* glob to match all nested paths.
quarkus.native.resources.includes=SndCtrl.dll,**/*.dll,**/*.so,**/*.dylib,**/*.jnilib,assets/**,org/eclipse/paho/**,META-INF/services/org.eclipse.paho.mqttv5.client.spi.NetworkModuleFactory,META-INF/services/javax.sound.midi.spi.MidiDeviceProvider

# Platform init: JNA, hid4java, and AWT (KeyMacro) must initialise at run time, not build time.
# reflect-config.json lives under META-INF/native-image/ on the classpath and is auto-discovered.
# Each comma is a list-item separator — each item becomes a separate native-image argument.
#
# This file IS authoritative for additional-build-args during a full `mvn package` (CI): Maven's
# process-resources filters it onto the classpath, where its ordinal outranks the pom property.
# The AWT/Java2D initialization policy differs per OS (Windows/Linux have libawt; macOS has none),
# so it is injected via the Maven-filtered ${native.awt.args} placeholder, whose value comes from
# the os-mac / default profiles in pom.xml. The leading comma in that value joins it to this list.
# Likewise ${native.platform.linker.args} injects the Windows GUI-subsystem linker flags
# (/SUBSYSTEM:WINDOWS, /ENTRY:mainCRTStartup) on Windows only (empty on Linux/macOS); it MUST stay in
# sync with the pom property of the same name. Both placeholders have to be appended here too, not
# just on the pom copy of additional-build-args, because this file outranks the pom during a full
# `mvn package` — omitting either one silently drops those flags in CI (e.g. the console window
# regression from the linker flags living only in the pom).
quarkus.native.additional-build-args=\
  -Os,\
  -R:MaxHeapSize=67108864,\
  --initialize-at-run-time=com.getpcpanel.util.Kernel32Console,\
  -J-XX:-UseCompressedOops,\
  --initialize-at-run-time=org.hid4java,\
  --initialize-at-run-time=com.fazecast.jSerialComm,\
  --initialize-at-run-time=com.sun.media.sound,\
  --initialize-at-run-time=javax.sound.midi.MidiSystem,\
  --initialize-at-run-time=com.getpcpanel.commands.KeyMacro,\
  --initialize-at-run-time=com.getpcpanel.integration.keyboard.platform.linux.LinuxKeyboard$X11,\
  --initialize-at-run-time=com.getpcpanel.integration.keyboard.platform.linux.LinuxKeyboard$XTest,\
  --initialize-at-run-time=com.getpcpanel.integration.volume.overlay.OverlayRenderer,\
  --initialize-at-run-time=org.freedesktop.dbus,\
  --trace-object-instantiation=java.security.SecureRandom,\
  --initialize-at-run-time=com.sun.jna,\
  --initialize-at-run-time=com.github.kwhat.jnativehook,\
  --initialize-at-run-time=com.getpcpanel.iconextract.Shell32Extra,\
  --initialize-at-run-time=com.getpcpanel.util.tray.win.WinShell32,\
  --initialize-at-run-time=com.getpcpanel.util.tray.win.WinUser32Ext,\
  --initialize-at-run-time=com.getpcpanel.sleepdetection.Win32Desktop,\
  --initialize-at-run-time=com.getpcpanel.sleepdetection.Win32PowerNotify,\
  --initialize-at-run-time=com.getpcpanel.sleepdetection.WindowsPowerEventMonitor,\
  --initialize-at-run-time=com.getpcpanel.sleepdetection.LinuxX11$LibX11,\
  --initialize-at-run-time=com.getpcpanel.sleepdetection.LinuxX11$LibXext,\
  --initialize-at-run-time=com.getpcpanel.integration.volume.platform.osx.CoreAudioLib,\
  --initialize-at-run-time=com.getpcpanel.integration.volume.platform.osx.CoreAudioLib$AudioObjectPropertyAddress,\
  --initialize-at-run-time=com.getpcpanel.integration.volume.platform.osx.CoreAudioLib$AudioObjectPropertyListenerProc,\
  --initialize-at-run-time=com.getpcpanel.integration.keyboard.platform.osx.OsxKeyboard$CoreGraphics,\
  --initialize-at-run-time=com.getpcpanel.integration.keyboard.platform.osx.OsxKeyboard$CoreFoundation,\
  --initialize-at-run-time=com.getpcpanel.util.OsxPermissionHelper,\
  --initialize-at-run-time=com.getpcpanel.util.OsxPermissionHelper$ApplicationServicesLib,\
  --initialize-at-run-time=com.getpcpanel.util.OsxPermissionHelper$IOKitLib,\
  --initialize-at-run-time=com.getpcpanel.integration.voicemeeter.VoicemeeterInstance,\
  --initialize-at-run-time=com.getpcpanel.integration.voicemeeter.VoicemeeterInstance$tagVBVMR_AUDIOINFO,\
  --initialize-at-run-time=com.getpcpanel.integration.voicemeeter.VoicemeeterInstance$tagVBVMR_AUDIOBUFFER,\
  --initialize-at-run-time=com.getpcpanel.integration.voicemeeter.VoicemeeterInstance$tagVBVMR_INTERFACE${native.awt.args}${native.platform.linker.args}
